<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☠️ VIRTEX SENDER ULTIMATE ☠️</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #0d1117;
            --border: #1a3a2a;
            --green: #00ff41;
            --cyan: #00ffff;
            --red: #ff3333;
            --yellow: #ffff00;
            --purple: #bf00ff;
            --orange: #ff6600;
            --pink: #ff00ff;
            --white: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top, rgba(0,255,65,0.03) 0%, transparent 70%),
                radial-gradient(ellipse at bottom, rgba(255,0,255,0.02) 0%, transparent 70%);
            padding: 15px;
        }

        /* scrollbar custom */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--green);
            border-radius: 3px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header */
        .header {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px 30px;
            margin-bottom: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,255,65,0.05);
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0,255,65,0.03), transparent, rgba(255,0,255,0.03), transparent);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #00ff41, #00ffff, #bf00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .header .subtitle {
            color: var(--red);
            font-size: 0.85em;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .header .version {
            color: #555;
            font-size: 0.7em;
            margin-top: 8px;
        }

        .status-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8em;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid;
        }

        .badge-ready {
            background: rgba(0,255,65,0.1);
            border-color: var(--green);
            color: var(--green);
            animation: pulse 2s infinite;
        }

        .badge-sending {
            background: rgba(255,0,0,0.1);
            border-color: var(--red);
            color: var(--red);
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-green { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .dot-red { background: var(--red); box-shadow: 0 0 10px var(--red); animation: blink 0.5s infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* counter cards */
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .counter-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .counter-card:hover {
            border-color: var(--green);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,255,65,0.1);
        }

        .counter-card .icon {
            font-size: 2em;
            margin-bottom: 8px;
        }

        .counter-card .value {
            font-size: 2.5em;
            font-weight: 900;
            color: var(--pink);
            text-shadow: 0 0 20px rgba(255,0,255,0.5);
            font-family: 'Courier New', monospace;
        }

        .counter-card .label {
            color: var(--cyan);
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* main grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
        }

        .panel:hover {
            border-color: rgba(0,255,65,0.3);
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .panel-header .icon-title {
            font-size: 1.5em;
        }

        .panel-header h2 {
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--cyan);
            font-weight: 700;
        }

        .panel-full {
            grid-column: 1 / -1;
        }

        /* form elements */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: var(--cyan);
            font-size: 0.8em;
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: #0a0a0a;
            border: 1px solid var(--border);
            color: var(--green);
            font-family: 'Courier New', monospace;
            border-radius: 10px;
            outline: none;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(0,255,65,0.1);
        }

        textarea {
            height: 100px;
            resize: vertical;
            line-height: 1.4;
        }

        select {
            cursor: pointer;
        }

        select option {
            background: #0a0a0a;
            color: var(--green);
        }

        /* buttons */
        .btn {
            padding: 11px 20px;
            border: 1px solid var(--green);
            background: transparent;
            color: var(--green);
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
            font-size: 0.8em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--green);
            color: #000;
            box-shadow: 0 0 25px rgba(0,255,65,0.4);
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.7em;
            border-radius: 8px;
        }

        .btn-danger {
            border-color: var(--red);
            color: var(--red);
        }
        .btn-danger:hover {
            background: var(--red);
            color: #000;
            box-shadow: 0 0 25px rgba(255,0,0,0.4);
        }

        .btn-warning {
            border-color: var(--yellow);
            color: var(--yellow);
        }
        .btn-warning:hover {
            background: var(--yellow);
            color: #000;
            box-shadow: 0 0 25px rgba(255,255,0,0.4);
        }

        .btn-purple {
            border-color: var(--purple);
            color: var(--purple);
        }
        .btn-purple:hover {
            background: var(--purple);
            color: #000;
            box-shadow: 0 0 25px rgba(191,0,255,0.4);
        }

        .btn-orange {
            border-color: var(--orange);
            color: var(--orange);
        }
        .btn-orange:hover {
            background: var(--orange);
            color: #000;
            box-shadow: 0 0 25px rgba(255,102,0,0.4);
        }

        .btn-pink {
            border-color: var(--pink);
            color: var(--pink);
        }
        .btn-pink:hover {
            background: var(--pink);
            color: #000;
            box-shadow: 0 0 25px rgba(255,0,255,0.4);
        }

        .btn-block {
            display: block;
            width: 100%;
            text-align: center;
            justify-content: center;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-group .btn {
            flex: 1;
            min-width: 100px;
            justify-content: center;
        }

        /* target list */
        .target-list {
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        .target-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(0,255,65,0.05);
            font-size: 0.85em;
            transition: background 0.2s;
        }

        .target-item:hover {
            background: rgba(0,255,65,0.03);
        }

        .target-item:last-child {
            border-bottom: none;
        }

        .target-num {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .target-type {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .type-wa {
            background: rgba(0,255,65,0.1);
            color: var(--green);
            border: 1px solid rgba(0,255,65,0.3);
        }

        .type-iphone {
            background: rgba(0,0,0,0.3);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* virtex type tabs */
        .virtex-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            background: #0a0a0a;
            border-radius: 12px;
            padding: 4px;
            border: 1px solid var(--border);
        }

        .virtex-tab {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 9px;
            font-size: 0.75em;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s;
            border: 1px solid transparent;
            background: transparent;
            color: #666;
        }

        .virtex-tab:hover {
            color: var(--green);
            background: rgba(0,255,65,0.05);
        }

        .virtex-tab.active {
            background: rgba(0,255,65,0.1);
            border-color: var(--green);
            color: var(--green);
            box-shadow: 0 0 15px rgba(0,255,65,0.2);
        }

        /* preview box */
        .preview-box {
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.75em;
            word-break: break-all;
            color: #555;
            margin-top: 10px;
        }

        /* log container */
        .log-container {
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            height: 350px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.72em;
            line-height: 1.5;
        }

        .log-line {
            padding: 3px 0;
            border-bottom: 1px solid rgba(0,255,65,0.03);
            display: flex;
            gap: 8px;
        }

        .log-time {
            color: #444;
            white-space: nowrap;
            min-width: 75px;
        }

        .log-msg.error { color: var(--red); }
        .log-msg.success { color: var(--green); }
        .log-msg.info { color: var(--cyan); }
        .log-msg.warning { color: var(--yellow); }
        .log-msg.iphone { color: #fff; }

        /* info row */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 12px;
            font-size: 0.78em;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed rgba(0,255,65,0.05);
        }

        .info-label {
            color: var(--cyan);
        }

        .info-value {
            color: var(--yellow);
            font-weight: 600;
        }

        /* notification toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85em;
            z-index: 1000;
            animation: slideIn 0.3s ease, slideOut 0.3s ease 2.7s;
            letter-spacing: 1px;
            max-width: 400px;
        }

        .toast-success {
            background: rgba(0,255,65,0.15);
            border: 1px solid var(--green);
            color: var(--green);
        }

        .toast-error {
            background: rgba(255,0,0,0.15);
            border: 1px solid var(--red);
            color: var(--red);
        }

        .toast-info {
            background: rgba(0,255,255,0.15);
            border: 1px solid var(--cyan);
            color: var(--cyan);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* responsive */
        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.8em;
            }
            .counter-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .counter-card .value {
                font-size: 1.8em;
            }
        }

        @media (max-width: 480px) {
            .counter-grid {
                grid-template-columns: 1fr;
            }
            .virtex-tab {
                font-size: 0.65em;
                padding: 8px 5px;
            }
        }

        .highlight {
            animation: highlightAnim 0.5s ease;
        }

        @keyframes highlightAnim {
            0%, 100% { background: transparent; }
            50% { background: rgba(0,255,65,0.1); }
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 15px 0;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-content">
                <h1>☠️ VIRTEX SENDER ULTIMATE ☠️</h1>
                <p class="subtitle">⚠️ multi-platform whatsapp & iphone virtex system ⚠️</p>
                <p class="version">v4.2 | all device support | no limit</p>
                <div class="status-row">
                    <div class="badge badge-ready" id="statusBadge">
                        <span class="dot dot-green"></span> ready
                    </div>
                    <div class="badge" style="background: rgba(0,255,255,0.1); border-color: var(--cyan); color: var(--cyan);">
                        📱 wa + 🍎 ios
                    </div>
                    <div class="badge" style="background: rgba(255,0,255,0.1); border-color: var(--pink); color: var(--pink);">
                        ⚡ 16 tipe virtex
                    </div>
                </div>
            </div>
        </div>

        <!-- COUNTER CARDS -->
        <div class="counter-grid">
            <div class="counter-card">
                <div class="icon">📤</div>
                <div class="value" id="totalSent">0</div>
                <div class="label">total virtex terkirim</div>
            </div>
            <div class="counter-card">
                <div class="icon">📱</div>
                <div class="value" id="waSent">0</div>
                <div class="label">whatsapp virtex</div>
            </div>
            <div class="counter-card">
                <div class="icon">🍎</div>
                <div class="value" id="iosSent">0</div>
                <div class="label">iphone virtex</div>
            </div>
            <div class="counter-card">
                <div class="icon">🎯</div>
                <div class="value" id="targetCount">0</div>
                <div class="label">target tersimpan</div>
            </div>
            <div class="counter-card">
                <div class="icon">💣</div>
                <div class="value" id="currentSize">0</div>
                <div class="label">karakter terakhir</div>
            </div>
        </div>

        <!-- MAIN GRID -->
        <div class="main-grid">
            <!-- TARGET PANEL -->
            <div class="panel">
                <div class="panel-header">
                    <span class="icon-title">🎯</span>
                    <h2>target management</h2>
                </div>

                <div class="input-group">
                    <label>nomor target:</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="newTarget" placeholder="6
